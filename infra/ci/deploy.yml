name: Deploy Services

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      image_tag:
        description: 'Image tag to deploy (defaults to latest main SHA)'
        required: false
        type: string

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/prizedraw
  SERVICES: core-api draw-service realtime-gateway notification-worker

jobs:
  # ===========================================================================
  # 1. Validate — ensure the build workflow succeeded for this tag
  # ===========================================================================
  validate:
    name: Validate Build Artifacts
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.resolve-tag.outputs.tag }}
    steps:
      - name: Resolve image tag
        id: resolve-tag
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying image tag: $TAG"

      - name: Verify images exist in GHCR
        run: |
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          for SERVICE in core-api draw-service realtime-gateway notification-worker; do
            echo "Checking $IMAGE_PREFIX/$SERVICE:$TAG ..."
            docker manifest inspect "$IMAGE_PREFIX/$SERVICE:$TAG" > /dev/null 2>&1 || {
              echo "ERROR: Image $IMAGE_PREFIX/$SERVICE:$TAG not found in registry"
              exit 1
            }
          done
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

  # ===========================================================================
  # 2. Deploy (with prod approval gate)
  # ===========================================================================
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [validate]
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment == 'prod' && 'https://prizedraw.tw' || inputs.environment == 'staging' && 'https://staging.prizedraw.tw' || 'https://dev.prizedraw.tw' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.3.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tags with Kustomize
        working-directory: infra/k8s/overlays/${{ inputs.environment }}
        run: |
          TAG="${{ needs.validate.outputs.image-tag }}"
          kustomize edit set image \
            ghcr.io/prizedraw/core-api=${{ env.IMAGE_PREFIX }}/core-api:${TAG} \
            ghcr.io/prizedraw/draw-service=${{ env.IMAGE_PREFIX }}/draw-service:${TAG} \
            ghcr.io/prizedraw/realtime-gateway=${{ env.IMAGE_PREFIX }}/realtime-gateway:${TAG} \
            ghcr.io/prizedraw/notification-worker=${{ env.IMAGE_PREFIX }}/notification-worker:${TAG}

      - name: Apply Kustomize overlay
        run: |
          kubectl apply -k infra/k8s/overlays/${{ inputs.environment }}/

      - name: Verify rollout — all services
        run: |
          NAMESPACE="prizedraw-${{ inputs.environment }}"
          FAILED=0
          for SERVICE in core-api draw-service realtime-gateway notification-worker; do
            echo "Waiting for prizedraw-${SERVICE} rollout..."
            if ! kubectl rollout status deployment/prizedraw-${SERVICE} \
              --namespace="${NAMESPACE}" \
              --timeout=300s; then
              echo "ERROR: prizedraw-${SERVICE} rollout failed"
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "One or more deployments failed to roll out"
            exit 1
          fi

  # ===========================================================================
  # 3. Smoke Test
  # ===========================================================================
  smoke-test:
    name: Smoke Test (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: [deploy]

    steps:
      - name: Determine base URL
        id: urls
        run: |
          case "${{ inputs.environment }}" in
            prod)    echo "base_url=https://api.prizedraw.tw" >> "$GITHUB_OUTPUT" ;;
            staging) echo "base_url=https://api.staging.prizedraw.tw" >> "$GITHUB_OUTPUT" ;;
            dev)     echo "base_url=https://api.dev.prizedraw.tw" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Wait for ingress propagation
        run: sleep 10

      - name: Health check — core-api
        run: |
          BASE="${{ steps.urls.outputs.base_url }}"
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${BASE}/health")
            if [ "$STATUS" = "200" ]; then
              echo "core-api health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed (status $STATUS) — retrying in 10s"
            sleep 10
          done
          echo "core-api health check failed after 5 attempts"
          exit 1

      - name: Health check — draw-service
        run: |
          BASE="${{ steps.urls.outputs.base_url }}"
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${BASE}/draw/health")
            if [ "$STATUS" = "200" ]; then
              echo "draw-service health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed (status $STATUS) — retrying in 10s"
            sleep 10
          done
          echo "draw-service health check failed after 5 attempts"
          exit 1

      - name: Health check — realtime-gateway
        run: |
          BASE="${{ steps.urls.outputs.base_url }}"
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${BASE}/realtime/health")
            if [ "$STATUS" = "200" ]; then
              echo "realtime-gateway health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed (status $STATUS) — retrying in 10s"
            sleep 10
          done
          echo "realtime-gateway health check failed after 5 attempts"
          exit 1

      - name: Health check — notification-worker
        run: |
          BASE="${{ steps.urls.outputs.base_url }}"
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${BASE}/notifications/health")
            if [ "$STATUS" = "200" ]; then
              echo "notification-worker health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed (status $STATUS) — retrying in 10s"
            sleep 10
          done
          echo "notification-worker health check failed after 5 attempts"
          exit 1

      - name: Smoke test — campaign list endpoint
        run: |
          BASE="${{ steps.urls.outputs.base_url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            -H "Accept: application/json" \
            "${BASE}/api/v1/campaigns/kuji")
          if [ "$STATUS" != "200" ]; then
            echo "Campaign list smoke test failed with status $STATUS"
            exit 1
          fi
          echo "Campaign list smoke test passed"

  # ===========================================================================
  # 4. Rollback on failure
  # ===========================================================================
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    if: failure() && (needs.deploy.result == 'failure' || needs.smoke-test.result == 'failure')

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Rollback all deployments
        run: |
          NAMESPACE="prizedraw-${{ inputs.environment }}"
          for SERVICE in core-api draw-service realtime-gateway notification-worker; do
            echo "Rolling back prizedraw-${SERVICE}..."
            kubectl rollout undo deployment/prizedraw-${SERVICE} \
              --namespace="${NAMESPACE}"
          done

      - name: Wait for rollback to complete
        run: |
          NAMESPACE="prizedraw-${{ inputs.environment }}"
          for SERVICE in core-api draw-service realtime-gateway notification-worker; do
            echo "Waiting for prizedraw-${SERVICE} rollback..."
            kubectl rollout status deployment/prizedraw-${SERVICE} \
              --namespace="${NAMESPACE}" \
              --timeout=180s
          done

      - name: Notify on rollback
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ inputs.environment }}';
            const tag = '${{ needs.validate.outputs.image-tag }}';
            const body = [
              '## Deployment Rolled Back',
              '',
              `Environment: **${env}**`,
              `Image tag: \`${tag}\``,
              '',
              'The deployment failed and has been automatically rolled back to the previous version.',
              'Please review the workflow logs for details.'
            ].join('\n');

            // Post as a workflow annotation since this is workflow_dispatch (no PR/issue)
            core.warning(body);
