name: Deploy Services

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      image_tag:
        description: 'Image tag to deploy (defaults to latest main SHA)'
        required: false
        type: string
      service:
        description: 'Service to deploy (or all)'
        required: false
        type: choice
        options:
          - all
          - core-api
          - draw-service
          - realtime-gateway
          - notification-worker
        default: all

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/prizedraw
  ALL_SERVICES: core-api draw-service realtime-gateway notification-worker

jobs:
  # ===========================================================================
  # 1. Validate -- ensure the build workflow succeeded for this tag
  # ===========================================================================
  validate:
    name: Validate Build Artifacts
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.resolve-tag.outputs.tag }}
      deploy-services: ${{ steps.resolve-services.outputs.services }}
    steps:
      - name: Resolve image tag
        id: resolve-tag
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying image tag: $TAG"

      - name: Resolve target services
        id: resolve-services
        run: |
          if [ "${{ inputs.service }}" = "all" ]; then
            echo "services=core-api draw-service realtime-gateway notification-worker" >> "$GITHUB_OUTPUT"
          else
            echo "services=${{ inputs.service }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify images exist in GHCR
        run: |
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          SERVICES="${{ steps.resolve-services.outputs.services }}"
          for SERVICE in $SERVICES; do
            echo "Checking $IMAGE_PREFIX/$SERVICE:$TAG ..."
            docker manifest inspect "$IMAGE_PREFIX/$SERVICE:$TAG" > /dev/null 2>&1 || {
              echo "ERROR: Image $IMAGE_PREFIX/$SERVICE:$TAG not found in registry"
              exit 1
            }
          done
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

  # ===========================================================================
  # 2. Deploy (with prod approval gate)
  # ===========================================================================
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [validate]
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment == 'prod' && 'https://prizedraw.tw' || inputs.environment == 'staging' && 'https://staging.prizedraw.tw' || 'https://dev.prizedraw.tw' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.3.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tags with Kustomize
        working-directory: infra/k8s/overlays/${{ inputs.environment }}
        run: |
          TAG="${{ needs.validate.outputs.image-tag }}"
          SERVICES="${{ needs.validate.outputs.deploy-services }}"
          ARGS=""
          for SERVICE in $SERVICES; do
            ARGS="$ARGS ghcr.io/prizedraw/${SERVICE}=${{ env.IMAGE_PREFIX }}/${SERVICE}:${TAG}"
          done
          kustomize edit set image $ARGS

      - name: Apply Kustomize overlay
        run: |
          kubectl apply -k infra/k8s/overlays/${{ inputs.environment }}/

      - name: Verify rollout
        run: |
          NAMESPACE="prizedraw-${{ inputs.environment }}"
          SERVICES="${{ needs.validate.outputs.deploy-services }}"
          FAILED=0
          for SERVICE in $SERVICES; do
            echo "Waiting for prizedraw-${SERVICE} rollout..."
            if ! kubectl rollout status deployment/prizedraw-${SERVICE} \
              --namespace="${NAMESPACE}" \
              --timeout=300s; then
              echo "ERROR: prizedraw-${SERVICE} rollout failed"
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "One or more deployments failed to roll out"
            exit 1
          fi

  # ===========================================================================
  # 3. Smoke Test
  # ===========================================================================
  smoke-test:
    name: Smoke Test (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: [validate, deploy]

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Determine base URL and namespace
        id: env
        run: |
          case "${{ inputs.environment }}" in
            prod)    echo "base_url=https://api.prizedraw.tw" >> "$GITHUB_OUTPUT" ;;
            staging) echo "base_url=https://api.staging.prizedraw.tw" >> "$GITHUB_OUTPUT" ;;
            dev)     echo "base_url=https://api.dev.prizedraw.tw" >> "$GITHUB_OUTPUT" ;;
          esac
          echo "namespace=prizedraw-${{ inputs.environment }}" >> "$GITHUB_OUTPUT"

      - name: Wait for ingress propagation
        run: sleep 10

      # -- core-api: external health check via ingress --
      - name: Smoke test -- core-api (external)
        if: contains(needs.validate.outputs.deploy-services, 'core-api') || inputs.service == 'all'
        run: |
          BASE="${{ steps.env.outputs.base_url }}"
          echo "=== Health check: GET ${BASE}/health ==="
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${BASE}/health")
            if [ "$STATUS" = "200" ]; then
              echo "core-api health check passed (attempt $i)"
              break
            fi
            echo "Attempt $i failed (status $STATUS) -- retrying in 10s"
            sleep 10
            if [ "$i" -eq 5 ]; then echo "core-api health check failed after 5 attempts"; exit 1; fi
          done

          echo "=== Boundary test: GET ${BASE}/api/v1/campaigns/kuji ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            -H "Accept: application/json" \
            "${BASE}/api/v1/campaigns/kuji")
          if [ "$STATUS" != "200" ]; then
            echo "core-api campaign list smoke test failed with status $STATUS"
            exit 1
          fi
          echo "core-api campaign list smoke test passed"

      # -- draw-service: external via ingress + internal health --
      - name: Smoke test -- draw-service (external + internal)
        if: contains(needs.validate.outputs.deploy-services, 'draw-service') || inputs.service == 'all'
        run: |
          BASE="${{ steps.env.outputs.base_url }}"
          NS="${{ steps.env.outputs.namespace }}"

          echo "=== Boundary test: GET ${BASE}/api/v1/live-draws ==="
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
              -H "Accept: application/json" \
              "${BASE}/api/v1/live-draws")
            if [ "$STATUS" = "200" ]; then
              echo "draw-service live-draws endpoint passed (attempt $i)"
              break
            fi
            echo "Attempt $i failed (status $STATUS) -- retrying in 10s"
            sleep 10
            if [ "$i" -eq 5 ]; then echo "draw-service smoke test failed after 5 attempts"; exit 1; fi
          done

          echo "=== Internal health: draw-service /health via kubectl exec ==="
          kubectl -n "$NS" exec deploy/prizedraw-core-api -- \
            curl -sf --max-time 5 http://prizedraw-draw-service:9093/health \
            && echo "draw-service internal health check passed" \
            || { echo "draw-service internal health check failed"; exit 1; }

      # -- realtime-gateway: internal health check (no external HTTP endpoint) --
      - name: Smoke test -- realtime-gateway (internal)
        if: contains(needs.validate.outputs.deploy-services, 'realtime-gateway') || inputs.service == 'all'
        run: |
          NS="${{ steps.env.outputs.namespace }}"

          echo "=== Internal health: realtime-gateway /health via kubectl exec ==="
          for i in $(seq 1 5); do
            if kubectl -n "$NS" exec deploy/prizedraw-core-api -- \
              curl -sf --max-time 5 http://prizedraw-realtime-gateway:9094/health; then
              echo "realtime-gateway internal health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed -- retrying in 10s"
            sleep 10
          done
          echo "realtime-gateway health check failed after 5 attempts"
          exit 1

      # -- notification-worker: internal health check (no external ingress) --
      - name: Smoke test -- notification-worker (internal)
        if: contains(needs.validate.outputs.deploy-services, 'notification-worker') || inputs.service == 'all'
        run: |
          NS="${{ steps.env.outputs.namespace }}"

          echo "=== Internal health: notification-worker /health via kubectl exec ==="
          for i in $(seq 1 5); do
            if kubectl -n "$NS" exec deploy/prizedraw-core-api -- \
              curl -sf --max-time 5 http://prizedraw-notification-worker:9095/health; then
              echo "notification-worker internal health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed -- retrying in 10s"
            sleep 10
          done
          echo "notification-worker health check failed after 5 attempts"
          exit 1

  # ===========================================================================
  # 4. Rollback on failure
  # ===========================================================================
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [validate, deploy, smoke-test]
    if: failure() && (needs.deploy.result == 'failure' || needs.smoke-test.result == 'failure')

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Rollback deployments
        run: |
          NAMESPACE="prizedraw-${{ inputs.environment }}"
          SERVICES="${{ needs.validate.outputs.deploy-services }}"
          for SERVICE in $SERVICES; do
            echo "Rolling back prizedraw-${SERVICE}..."
            kubectl rollout undo deployment/prizedraw-${SERVICE} \
              --namespace="${NAMESPACE}"
          done

      - name: Wait for rollback to complete
        run: |
          NAMESPACE="prizedraw-${{ inputs.environment }}"
          SERVICES="${{ needs.validate.outputs.deploy-services }}"
          for SERVICE in $SERVICES; do
            echo "Waiting for prizedraw-${SERVICE} rollback..."
            kubectl rollout status deployment/prizedraw-${SERVICE} \
              --namespace="${NAMESPACE}" \
              --timeout=180s
          done

      - name: Notify on rollback
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ inputs.environment }}';
            const tag = '${{ needs.validate.outputs.image-tag }}';
            const service = '${{ inputs.service }}';
            const body = [
              '## Deployment Rolled Back',
              '',
              `Environment: **${env}**`,
              `Service(s): **${service}**`,
              `Image tag: \`${tag}\``,
              '',
              'The deployment failed and has been automatically rolled back to the previous version.',
              'Please review the workflow logs for details.'
            ].join('\n');

            // Post as a workflow annotation since this is workflow_dispatch (no PR/issue)
            core.warning(body);
