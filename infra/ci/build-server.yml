name: Build & Test Server

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
      - 'api-contracts/**'
      - 'kmp-shared-js/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/build-server.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'server/**'
      - 'api-contracts/**'
      - 'kmp-shared-js/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'settings.gradle.kts'

permissions:
  contents: read
  checks: write

jobs:
  lint:
    name: Lint (ktlint + detekt)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Run detekt
        run: ./gradlew detekt --config detekt.yml

  test:
    name: Unit Tests (Kotest)
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: prizedraw_test
          POSTGRES_USER: prizedraw
          POSTGRES_PASSWORD: prizedraw
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run tests
        run: ./gradlew :server:test :api-contracts:allTests
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/prizedraw_test
          DATABASE_USER: prizedraw
          DATABASE_PASSWORD: prizedraw
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-for-ci-only

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "**/build/test-results/**/*.xml"

  build:
    name: Build Shadow JAR
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build shadow JAR
        run: ./gradlew :server:shadowJar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: server/build/libs/prize-draw-server-*.jar
          retention-days: 7

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.server
          push: false
          tags: prizedraw/server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
