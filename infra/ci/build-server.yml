name: Build & Test Server

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
      - 'draw-service/**'
      - 'realtime-gateway/**'
      - 'notification-worker/**'
      - 'api-contracts/**'
      - 'kmp-shared-js/**'
      - 'shared/**'
      - 'db-schema/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'settings.gradle.kts'
      - 'infra/docker/**'
      - 'infra/k8s/**'
      - 'infra/ci/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'server/**'
      - 'draw-service/**'
      - 'realtime-gateway/**'
      - 'notification-worker/**'
      - 'api-contracts/**'
      - 'kmp-shared-js/**'
      - 'shared/**'
      - 'db-schema/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'settings.gradle.kts'
      - 'infra/docker/**'
      - 'infra/k8s/**'
      - 'infra/ci/**'

permissions:
  contents: read
  checks: write
  packages: write

jobs:
  lint:
    name: Lint (ktlint + detekt)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Run detekt
        run: ./gradlew detekt --config detekt.yml

  test:
    name: Test (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: core-api
            module: server
          - name: draw-service
            module: draw-service
          - name: realtime-gateway
            module: realtime-gateway
          - name: notification-worker
            module: notification-worker
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: prizedraw_test
          POSTGRES_USER: prizedraw
          POSTGRES_PASSWORD: prizedraw
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build and test ${{ matrix.service.name }}
        run: ./gradlew :${{ matrix.service.module }}:build
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/prizedraw_test
          DATABASE_USER: prizedraw
          DATABASE_PASSWORD: prizedraw
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-for-ci-only

      - name: Run api-contracts tests
        if: matrix.service.module == 'server'
        run: ./gradlew :api-contracts:allTests
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/prizedraw_test
          DATABASE_USER: prizedraw
          DATABASE_PASSWORD: prizedraw
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-for-ci-only

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "**/build/test-results/**/*.xml"
          check_name: "Test Results (${{ matrix.service.name }})"

  docker:
    name: Docker (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: core-api
            module: server
          - name: draw-service
            module: draw-service
          - name: realtime-gateway
            module: realtime-gateway
          - name: notification-worker
            module: notification-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build shadow JAR
        run: ./gradlew :${{ matrix.service.module }}:shadowJar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.${{ matrix.service.name }}
          push: true
          tags: |
            ghcr.io/prizedraw/${{ matrix.service.name }}:${{ github.sha }}
            ghcr.io/prizedraw/${{ matrix.service.name }}:latest
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
