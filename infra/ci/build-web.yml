name: Build & Test Web

on:
  push:
    branches: [main, develop]
    paths:
      - 'web/**'
      - 'admin/**'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/build-web.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'web/**'
      - 'admin/**'
      - 'pnpm-workspace.yaml'

permissions:
  contents: read
  checks: write

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [web, admin]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ matrix.app }}-${{ hashFiles(format('{0}/pnpm-lock.yaml', matrix.app)) }}
          restore-keys: |
            ${{ runner.os }}-pnpm-${{ matrix.app }}-

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: ${{ matrix.app }}
        run: pnpm type-check

      - name: ESLint
        working-directory: ${{ matrix.app }}
        run: pnpm lint

      - name: Prettier format check
        working-directory: ${{ matrix.app }}
        run: pnpm format:check

  test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint-and-format
    strategy:
      matrix:
        app: [web, admin]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: pnpm install --frozen-lockfile

      - name: Run Vitest
        working-directory: ${{ matrix.app }}
        run: pnpm test

  build:
    name: Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        app: [web, admin]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: ${{ matrix.app }}
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Bundle size check
        working-directory: ${{ matrix.app }}
        run: |
          # Fail if any single JS chunk exceeds 500KB
          find .next/static/chunks -name "*.js" -size +500k -exec echo "WARN: Large chunk: {}" \; | tee /tmp/large_chunks.txt
          # Fail on chunks > 1MB
          OVERSIZED=$(find .next/static/chunks -name "*.js" -size +1000k 2>/dev/null | wc -l)
          if [ "$OVERSIZED" -gt "0" ]; then
            echo "ERROR: Found JS chunks exceeding 1MB limit"
            find .next/static/chunks -name "*.js" -size +1000k
            exit 1
          fi

  docker:
    name: Docker Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        include:
          - app: web
            dockerfile: infra/docker/Dockerfile.web
          - app: admin
            dockerfile: infra/docker/Dockerfile.admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.app }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.app }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: prizedraw/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
