apiVersion: v1
kind: Service
metadata:
  name: prizedraw-draw-service
  labels:
    app: draw-service
    component: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9093"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: draw-service
  ports:
    - name: http
      port: 80
      targetPort: 9093
      protocol: TCP
