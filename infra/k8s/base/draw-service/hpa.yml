apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: prizedraw-draw-service
  labels:
    app: draw-service
    component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: prizedraw-draw-service

  minReplicas: 2
  maxReplicas: 20

  metrics:
    # Aggressive CPU target for burst draw traffic
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30        # React faster to draw spikes
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
