apiVersion: v1
kind: Service
metadata:
  name: prizedraw-core-api
  labels:
    app: core-api
    component: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9092"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: core-api
  ports:
    - name: http
      port: 80
      targetPort: 9092
      protocol: TCP
