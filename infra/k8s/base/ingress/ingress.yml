apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prizedraw-ingress
  labels:
    app: prizedraw
  annotations:
    kubernetes.io/ingress.class: nginx
    # TLS / certificate management via cert-manager (Let's Encrypt)
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # WebSocket support: disable proxy buffering for upgrade requests
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # Enable gzip at the ingress layer as a second compression pass
    nginx.ingress.kubernetes.io/enable-gzip: "true"
    nginx.ingress.kubernetes.io/gzip-types: "application/json text/plain text/html application/javascript"
    # Rate limiting at ingress level (coarse-grained — application layer is finer)
    nginx.ingress.kubernetes.io/limit-rps: "200"
    nginx.ingress.kubernetes.io/limit-connections: "100"
    # HSTS header at ingress (complements SecurityHeaders plugin)
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Maximum body size for file uploads (profile avatars, prize photos)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # CORS is handled by the application — disable ingress CORS
    nginx.ingress.kubernetes.io/enable-cors: "false"

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.prizedraw.tw
        - www.prizedraw.tw
        - prizedraw.tw
        - admin.prizedraw.tw
        - cs.prizedraw.tw
      secretName: prizedraw-tls-cert

  rules:
    # -----------------------------------------------------------------------
    # API backend — microservice routing by path
    # -----------------------------------------------------------------------
    - host: api.prizedraw.tw
      http:
        paths:
          # Draw-related endpoints → draw-service
          - path: /api/v1/draws
            pathType: Prefix
            backend:
              service:
                name: prizedraw-draw-service
                port:
                  name: http
          - path: /api/v1/leaderboards
            pathType: Prefix
            backend:
              service:
                name: prizedraw-draw-service
                port:
                  name: http
          - path: /api/v1/live-draws
            pathType: Prefix
            backend:
              service:
                name: prizedraw-draw-service
                port:
                  name: http

          # WebSocket endpoints → realtime-gateway
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: prizedraw-realtime-gateway
                port:
                  name: http

          # Health / readiness / metrics → core-api
          - path: /health
            pathType: Exact
            backend:
              service:
                name: prizedraw-core-api
                port:
                  name: http
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: prizedraw-core-api
                port:
                  name: http
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: prizedraw-core-api
                port:
                  name: http

          # Everything else under /api → core-api (catch-all, must be last)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: prizedraw-core-api
                port:
                  name: http

    # -----------------------------------------------------------------------
    # Player-facing web app (Next.js)
    # -----------------------------------------------------------------------
    - host: prizedraw.tw
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prizedraw-web
                port:
                  name: http

    - host: www.prizedraw.tw
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prizedraw-web
                port:
                  name: http

    # -----------------------------------------------------------------------
    # Admin dashboard (Next.js)
    # -----------------------------------------------------------------------
    - host: admin.prizedraw.tw
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prizedraw-admin
                port:
                  name: http

    # -----------------------------------------------------------------------
    # Customer Service app (Next.js) — internal staff tool
    # -----------------------------------------------------------------------
    - host: cs.prizedraw.tw
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prizedraw-cs
                port:
                  name: http
