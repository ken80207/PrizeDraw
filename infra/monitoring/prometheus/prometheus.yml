global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: prizeDraw-prod
    environment: production

# Load alert rules
rule_files:
  - "alert-rules.yml"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # -----------------------------------------------------------------------
  # PrizeDraw Ktor server — Micrometer Prometheus metrics
  # -----------------------------------------------------------------------
  - job_name: prizeDraw-server
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets:
          - server:8080
        labels:
          service: server
          component: ktor
    # Re-label to normalize k8s pod names when running in cluster
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # -----------------------------------------------------------------------
  # PostgreSQL Exporter (postgres_exporter sidecar)
  # -----------------------------------------------------------------------
  - job_name: postgres
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          service: postgres
          component: database

  # -----------------------------------------------------------------------
  # Redis Exporter (redis_exporter sidecar)
  # -----------------------------------------------------------------------
  - job_name: redis
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          service: redis
          component: cache

  # -----------------------------------------------------------------------
  # Node Exporter — host-level metrics for each K8s node
  # -----------------------------------------------------------------------
  - job_name: node
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          service: node

  # -----------------------------------------------------------------------
  # Kubernetes metrics (kube-state-metrics)
  # -----------------------------------------------------------------------
  - job_name: kube-state-metrics
    static_configs:
      - targets:
          - kube-state-metrics:8080
        labels:
          service: kubernetes
