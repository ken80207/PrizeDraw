global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: prizeDraw-prod
    environment: production

# Load alert rules
rule_files:
  - "alert-rules.yml"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # -----------------------------------------------------------------------
  # Core API — main REST gateway (campaigns, payments, players, etc.)
  # -----------------------------------------------------------------------
  - job_name: core-api
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets:
          - prizedraw-core-api:9092
        labels:
          service: core-api
          component: ktor
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # -----------------------------------------------------------------------
  # Draw Service — draw execution, queue management, prize distribution
  # -----------------------------------------------------------------------
  - job_name: draw-service
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets:
          - prizedraw-draw-service:9093
        labels:
          service: draw-service
          component: ktor
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # -----------------------------------------------------------------------
  # Realtime Gateway — WebSocket connections, Redis pub/sub fanout
  # -----------------------------------------------------------------------
  - job_name: realtime-gateway
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets:
          - prizedraw-realtime-gateway:9094
        labels:
          service: realtime-gateway
          component: ktor
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # -----------------------------------------------------------------------
  # Notification Worker — outbox polling, push notifications, LINE messaging
  # -----------------------------------------------------------------------
  - job_name: notification-worker
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          - prizedraw-notification-worker:9095
        labels:
          service: notification-worker
          component: ktor
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # -----------------------------------------------------------------------
  # PostgreSQL Exporter (postgres_exporter sidecar)
  # -----------------------------------------------------------------------
  - job_name: postgres
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          service: postgres
          component: database

  # -----------------------------------------------------------------------
  # Redis Exporter (redis_exporter sidecar)
  # -----------------------------------------------------------------------
  - job_name: redis
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          service: redis
          component: cache

  # -----------------------------------------------------------------------
  # Node Exporter — host-level metrics for each K8s node
  # -----------------------------------------------------------------------
  - job_name: node
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          service: node

  # -----------------------------------------------------------------------
  # Kubernetes metrics (kube-state-metrics)
  # -----------------------------------------------------------------------
  - job_name: kube-state-metrics
    static_configs:
      - targets:
          - kube-state-metrics:8080
        labels:
          service: kubernetes
