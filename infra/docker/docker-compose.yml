services:
  postgres:
    image: postgres:16-alpine
    container_name: prizedraw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-prizedraw}
      POSTGRES_USER: ${POSTGRES_USER:-prizedraw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prizedraw}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prizedraw} -d ${POSTGRES_DB:-prizedraw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prizedraw-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: prizedraw-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  server:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.server
    container_name: prizedraw-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 9092
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-prizedraw}
      DATABASE_USER: ${POSTGRES_USER:-prizedraw}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-prizedraw}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-256-bit-secret}
      JWT_ISSUER: ${JWT_ISSUER:-prizedraw}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-prizedraw-api}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-prizedraw}
      CORS_ALLOWED_HOSTS: ${CORS_ALLOWED_HOSTS:-localhost:3000,localhost:3001}
    ports:
      - "${SERVER_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9092/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ../../web
      dockerfile: ../infra/docker/Dockerfile.web
    container_name: prizedraw-web
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:9092}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:9092}
    ports:
      - "${WEB_PORT:-3000}:3000"

  admin:
    build:
      context: ../../admin
      dockerfile: ../infra/docker/Dockerfile.admin
    container_name: prizedraw-admin
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:9092}
    ports:
      - "${ADMIN_PORT:-3001}:3000"

  cs:
    build:
      context: ../../cs
      dockerfile: ../infra/docker/Dockerfile.cs
    container_name: prizedraw-cs
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:9092}
    ports:
      - "${CS_PORT:-3002}:3000"

volumes:
  postgres_data:
  redis_data:
  minio_data:
