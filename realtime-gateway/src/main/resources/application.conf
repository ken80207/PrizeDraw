ktor {
    deployment {
        port = 9094
        port = ${?PORT}
        host = "0.0.0.0"
    }

    application {
        modules = [com.prizedraw.realtime.ApplicationKt.module]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/prizedraw"
    url = ${?DATABASE_URL}
    driver = "org.postgresql.Driver"
    user = "prizedraw"
    user = ${?DATABASE_USER}
    password = "prizedraw"
    password = ${?DATABASE_PASSWORD}
    poolSize = 10
    poolSize = ${?DATABASE_POOL_SIZE}
}

redis {
    host = "localhost"
    host = ${?REDIS_HOST}
    port = 6379
    port = ${?REDIS_PORT}
    password = "redispassword"
    password = ${?REDIS_PASSWORD}
    database = 0
    database = ${?REDIS_DATABASE}
}

jwt {
    secret = ${JWT_SECRET}
    issuer = "prizedraw"
    issuer = ${?JWT_ISSUER}
}

services {
    coreApiBaseUrl = "http://localhost:9092"
    coreApiBaseUrl = ${?CORE_API_BASE_URL}
    drawServiceBaseUrl = "http://localhost:9093"
    drawServiceBaseUrl = ${?DRAW_SERVICE_BASE_URL}
}
