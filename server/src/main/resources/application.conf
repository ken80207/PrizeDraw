ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        host = "0.0.0.0"
    }

    application {
        modules = [com.prizedraw.ApplicationKt.module]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/prizedraw"
    url = ${?DATABASE_URL}
    driver = "org.postgresql.Driver"
    user = "prizedraw"
    user = ${?DATABASE_USER}
    password = "prizedraw"
    password = ${?DATABASE_PASSWORD}
    poolSize = 20
    poolSize = ${?DATABASE_POOL_SIZE}
}

redis {
    url = "redis://:redispassword@localhost:6379"
    url = ${?REDIS_URL}
    database = 0
    database = ${?REDIS_DATABASE}
}

jwt {
    secret = ${JWT_SECRET}
    issuer = "prizedraw"
    issuer = ${?JWT_ISSUER}
    audience = "prizedraw-api"
    audience = ${?JWT_AUDIENCE}
    accessTokenExpirySeconds = 900
    accessTokenExpirySeconds = ${?JWT_ACCESS_EXPIRY_SECONDS}
    refreshTokenExpiryDays = 30
    refreshTokenExpiryDays = ${?JWT_REFRESH_EXPIRY_DAYS}
}

storage {
    endpoint = "http://localhost:9000"
    endpoint = ${?STORAGE_ENDPOINT}
    accessKey = "minioadmin"
    accessKey = ${?STORAGE_ACCESS_KEY}
    secretKey = "minioadmin"
    secretKey = ${?STORAGE_SECRET_KEY}
    bucket = "prizedraw"
    bucket = ${?STORAGE_BUCKET}
    region = "us-east-1"
    region = ${?STORAGE_REGION}
}

cors {
    allowedHosts = ["localhost:3000", "localhost:3001"]
    allowedHosts = ${?CORS_ALLOWED_HOSTS}
}

features {
    rateLimitEnabled = true
    rateLimitEnabled = ${?RATE_LIMIT_ENABLED}
    requestsPerMinute = 60
    requestsPerMinute = ${?RATE_LIMIT_REQUESTS_PER_MINUTE}
}

rateLimit {
    # Unauthenticated / auth endpoints (login, OTP) — brute-force protection
    authLimitPerMinute = 5
    authLimitPerMinute = ${?RATE_LIMIT_AUTH_PER_MINUTE}
    # Draw endpoints per authenticated user
    drawLimitPerMinute = 10
    drawLimitPerMinute = ${?RATE_LIMIT_DRAW_PER_MINUTE}
    # General authenticated API per user
    generalLimitPerMinute = 60
    generalLimitPerMinute = ${?RATE_LIMIT_GENERAL_PER_MINUTE}
    # OTP send endpoint (very restrictive)
    otpLimitPerMinute = 2
    otpLimitPerMinute = ${?RATE_LIMIT_OTP_PER_MINUTE}
}
