name: Server CI

on:
  pull_request:
    paths:
      - 'server/**'
      - 'draw-service/**'
      - 'realtime-gateway/**'
      - 'notification-worker/**'
      - 'api-contracts/**'
      - 'db-schema/**'
      - 'shared/**'
      - 'kmp-shared-js/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.forgejo/workflows/server-ci.yml'
      - 'infra/docker/Dockerfile.*'
  workflow_dispatch:

jobs:
  test:
    name: Lint & Test & Build
    runs-on: linux
    timeout-minutes: 30
    steps:
      - name: Install Docker
        run: apt-get update && apt-get install -y docker.io

      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Set up JDK 21
        uses: https://github.com/actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: https://github.com/actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: gradle-

      - name: Start test containers
        run: |
          docker run -d --name test-postgres \
            -e POSTGRES_DB=prizedraw_test \
            -e POSTGRES_USER=prizedraw \
            -e POSTGRES_PASSWORD=prizedraw \
            postgres:16-alpine

          docker run -d --name test-redis \
            redis:7-alpine

          for i in $(seq 1 15); do
            if docker exec test-postgres pg_isready -U prizedraw 2>/dev/null; then
              echo "PostgreSQL ready"
              break
            fi
            sleep 2
          done
          for i in $(seq 1 10); do
            if docker exec test-redis redis-cli ping 2>/dev/null | grep -q PONG; then
              echo "Redis ready"
              break
            fi
            sleep 1
          done

          PG_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' test-postgres)
          REDIS_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' test-redis)
          echo "PG_IP=${PG_IP}" >> $GITHUB_ENV
          echo "REDIS_IP=${REDIS_IP}" >> $GITHUB_ENV

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon

      - name: Run detekt
        run: ./gradlew detekt --no-daemon

      - name: Run tests
        run: |
          ./gradlew \
            :server:test \
            :draw-service:test \
            :realtime-gateway:test \
            :notification-worker:test \
            :api-contracts:jvmTest \
            --no-daemon
        env:
          DATABASE_URL: jdbc:postgresql://${{ env.PG_IP }}:5432/prizedraw_test
          DATABASE_USER: prizedraw
          DATABASE_PASSWORD: prizedraw
          REDIS_URL: redis://${{ env.REDIS_IP }}:6379
          JWT_SECRET: test-secret-for-ci-only

      - name: Build shadow JARs
        run: |
          ./gradlew \
            :server:shadowJar \
            :draw-service:shadowJar \
            :realtime-gateway:shadowJar \
            :notification-worker:shadowJar \
            --no-daemon -x test

      - name: Upload test results on failure
        if: failure()
        uses: https://github.com/actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker rm -f test-postgres test-redis 2>/dev/null || true
