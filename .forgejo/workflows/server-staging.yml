name: Server Staging Deploy

on:
  push:
    branches: [staging]
    paths:
      - 'server/**'
      - 'draw-service/**'
      - 'realtime-gateway/**'
      - 'notification-worker/**'
      - 'api-contracts/**'
      - 'db-schema/**'
      - 'shared/**'
      - 'kmp-shared-js/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.forgejo/workflows/server-staging.yml'
      - 'deployment/nas-staging/**'
      - 'infra/docker/Dockerfile.*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: kennily/prizedraw

jobs:
  test:
    name: Test
    runs-on: linux
    timeout-minutes: 30
    steps:
      - name: Install Docker
        run: apt-get update && apt-get install -y docker.io

      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Set up JDK 21
        uses: https://github.com/actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: https://github.com/actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: gradle-

      - name: Start test containers
        run: |
          docker run -d --name test-postgres \
            -e POSTGRES_DB=prizedraw_test \
            -e POSTGRES_USER=prizedraw \
            -e POSTGRES_PASSWORD=prizedraw \
            -p 5434:5432 \
            postgres:16-alpine

          docker run -d --name test-redis \
            -p 6381:6379 \
            redis:7-alpine

          for i in $(seq 1 15); do
            if docker exec test-postgres pg_isready -U prizedraw 2>/dev/null; then break; fi
            sleep 2
          done
          for i in $(seq 1 10); do
            if docker exec test-redis redis-cli ping 2>/dev/null | grep -q PONG; then break; fi
            sleep 1
          done

      - name: Run tests
        run: |
          ./gradlew \
            :server:test \
            :draw-service:test \
            :realtime-gateway:test \
            :notification-worker:test \
            :api-contracts:allTests \
            --no-daemon
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5434/prizedraw_test
          DATABASE_USER: prizedraw
          DATABASE_PASSWORD: prizedraw
          REDIS_URL: redis://localhost:6381
          JWT_SECRET: test-secret-for-ci-only

      - name: Cleanup
        if: always()
        run: docker rm -f test-postgres test-redis 2>/dev/null || true

  build-and-deploy:
    name: Build & Deploy to Staging
    runs-on: linux
    needs: test
    timeout-minutes: 30
    steps:
      - name: Install Docker
        run: apt-get update && apt-get install -y docker.io

      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Set up JDK 21
        uses: https://github.com/actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: https://github.com/actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: gradle-

      - name: Build shadow JARs
        run: |
          ./gradlew \
            :server:shadowJar \
            :draw-service:shadowJar \
            :realtime-gateway:shadowJar \
            :notification-worker:shadowJar \
            --no-daemon -x test

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u kennily --password-stdin

      - name: Build and push Docker images
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)

          SERVICES="core-api draw-service realtime-gateway notification-worker"
          for SERVICE in $SERVICES; do
            DOCKERFILE="infra/docker/Dockerfile.${SERVICE}"
            IMAGE="${REGISTRY}/${IMAGE_PREFIX}_${SERVICE}"

            docker build -f "$DOCKERFILE" -t "${IMAGE}:staging" -t "${IMAGE}:sha-${SHORT_SHA}" .
            docker push "${IMAGE}:staging"
            docker push "${IMAGE}:sha-${SHORT_SHA}"

            echo "✅ Pushed ${IMAGE}:staging"
          done

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NAS_SSH_PRIVATE_KEY }}" > ~/.ssh/nas_key
          chmod 600 ~/.ssh/nas_key

      - name: Upload deployment files
        run: |
          NAS_HOST="${{ secrets.NAS_HOST }}"
          NAS_USER="${{ secrets.NAS_USER }}"

          ssh -i ~/.ssh/nas_key -o StrictHostKeyChecking=accept-new ${NAS_USER}@${NAS_HOST} \
            "mkdir -p ~/prizedraw-staging"

          scp -i ~/.ssh/nas_key -o StrictHostKeyChecking=accept-new \
            deployment/nas-staging/docker-compose.yml ${NAS_USER}@${NAS_HOST}:~/prizedraw-staging/

      - name: Create .env and deploy
        run: |
          NAS_HOST="${{ secrets.NAS_HOST }}"
          NAS_USER="${{ secrets.NAS_USER }}"

          ssh -i ~/.ssh/nas_key -o StrictHostKeyChecking=accept-new ${NAS_USER}@${NAS_HOST} << ENDSSH
            cd ~/prizedraw-staging

            cat > .env << 'ENVEOF'
          APP_ENV=staging
          LOG_LEVEL=INFO
          RATE_LIMIT_ENABLED=true
          POSTGRES_DB=prizedraw_staging
          POSTGRES_USER=prizedraw
          POSTGRES_PASSWORD=${{ secrets.PRIZEDRAW_DB_PASSWORD }}
          POSTGRES_PORT=5433
          REDIS_PASSWORD=${{ secrets.PRIZEDRAW_REDIS_PASSWORD }}
          MINIO_ROOT_USER=${{ secrets.PRIZEDRAW_MINIO_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.PRIZEDRAW_MINIO_PASSWORD }}
          STORAGE_BUCKET=prizedraw-staging
          JWT_SECRET=${{ secrets.PRIZEDRAW_JWT_SECRET }}
          JWT_ISSUER=prizedraw
          JWT_AUDIENCE=prizedraw-api
          REGISTRY=ghcr.io
          IMAGE_PREFIX=kennily/prizedraw
          IMAGE_TAG=staging
          ENVEOF

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u kennily --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans
          ENDSSH

      - name: Health check
        run: |
          NAS_HOST="${{ secrets.NAS_HOST }}"
          NAS_USER="${{ secrets.NAS_USER }}"
          echo "Waiting for services to start..."
          sleep 15

          ssh -i ~/.ssh/nas_key -o StrictHostKeyChecking=accept-new ${NAS_USER}@${NAS_HOST} << 'ENDSSH'
            SERVICES="core-api:9092 draw-service:9093 realtime-gateway:9094 notification-worker:9095"
            for ENTRY in $SERVICES; do
              NAME=$(echo $ENTRY | cut -d: -f1)
              PORT=$(echo $ENTRY | cut -d: -f2)
              echo "Checking $NAME on port $PORT..."
              for i in $(seq 1 10); do
                if curl -sf http://localhost:$PORT/health > /dev/null 2>&1; then
                  echo "✅ $NAME is healthy"
                  break
                fi
                if [ $i -eq 10 ]; then
                  echo "❌ $NAME failed health check"
                  docker logs prizedraw-staging-${NAME} --tail 30
                  exit 1
                fi
                sleep 5
              done
            done
            echo "🚀 All services deployed to staging"
          ENDSSH
