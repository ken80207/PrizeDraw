name: Server Staging Deploy

on:
  push:
    branches: [staging]
    paths:
      - 'server/**'
      - 'draw-service/**'
      - 'realtime-gateway/**'
      - 'notification-worker/**'
      - 'api-contracts/**'
      - 'db-schema/**'
      - 'shared/**'
      - 'kmp-shared-js/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.forgejo/workflows/server-staging.yml'
      - 'deployment/nas-staging/**'
      - 'infra/docker/Dockerfile.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: kennily/prizedraw

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: linux
    outputs:
      core-api: ${{ steps.changes.outputs.core_api }}
      draw-service: ${{ steps.changes.outputs.draw_service }}
      realtime-gateway: ${{ steps.changes.outputs.realtime_gateway }}
      notification-worker: ${{ steps.changes.outputs.notification_worker }}
      shared-changed: ${{ steps.changes.outputs.shared_changed }}
      services-to-build: ${{ steps.changes.outputs.services_to_build }}
      services-to-deploy: ${{ steps.changes.outputs.services_to_deploy }}
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "Changed files:"
          echo "$CHANGED"

          # Shared modules → all services need rebuild
          SHARED_CHANGED=false
          if echo "$CHANGED" | grep -qE '^(shared/|db-schema/|api-contracts/|kmp-shared-js/|gradle/|.*\.gradle\.kts|gradle\.properties|settings\.gradle\.kts|infra/docker/Dockerfile\.|\.forgejo/workflows/server|deployment/)'; then
            SHARED_CHANGED=true
          fi
          echo "shared_changed=${SHARED_CHANGED}" >> $GITHUB_OUTPUT

          # Per-service detection
          CORE_API=false
          DRAW=false
          REALTIME=false
          NOTIFICATION=false

          if [ "$SHARED_CHANGED" = "true" ]; then
            CORE_API=true; DRAW=true; REALTIME=true; NOTIFICATION=true
          else
            if echo "$CHANGED" | grep -q '^server/'; then CORE_API=true; fi
            if echo "$CHANGED" | grep -q '^draw-service/'; then DRAW=true; fi
            if echo "$CHANGED" | grep -q '^realtime-gateway/'; then REALTIME=true; fi
            if echo "$CHANGED" | grep -q '^notification-worker/'; then NOTIFICATION=true; fi
          fi

          echo "core_api=${CORE_API}" >> $GITHUB_OUTPUT
          echo "draw_service=${DRAW}" >> $GITHUB_OUTPUT
          echo "realtime_gateway=${REALTIME}" >> $GITHUB_OUTPUT
          echo "notification_worker=${NOTIFICATION}" >> $GITHUB_OUTPUT

          # Build comma-separated lists for downstream jobs
          BUILD_LIST=""
          DEPLOY_LIST=""
          if [ "$CORE_API" = "true" ]; then BUILD_LIST="core-api"; DEPLOY_LIST="core-api:9092"; fi
          if [ "$DRAW" = "true" ]; then
            BUILD_LIST="${BUILD_LIST:+$BUILD_LIST,}draw-service"
            DEPLOY_LIST="${DEPLOY_LIST:+$DEPLOY_LIST,}draw-service:9093"
          fi
          if [ "$REALTIME" = "true" ]; then
            BUILD_LIST="${BUILD_LIST:+$BUILD_LIST,}realtime-gateway"
            DEPLOY_LIST="${DEPLOY_LIST:+$DEPLOY_LIST,}realtime-gateway:9094"
          fi
          if [ "$NOTIFICATION" = "true" ]; then
            BUILD_LIST="${BUILD_LIST:+$BUILD_LIST,}notification-worker"
            DEPLOY_LIST="${DEPLOY_LIST:+$DEPLOY_LIST,}notification-worker:9095"
          fi

          echo "services_to_build=${BUILD_LIST}" >> $GITHUB_OUTPUT
          echo "services_to_deploy=${DEPLOY_LIST}" >> $GITHUB_OUTPUT
          echo ""
          echo "📋 Services to build: ${BUILD_LIST:-none}"
          echo "📋 Services to deploy: ${DEPLOY_LIST:-none}"

  test:
    name: Test
    runs-on: linux
    needs: detect-changes
    if: needs.detect-changes.outputs.services-to-build != ''
    timeout-minutes: 30
    steps:
      - name: Install Docker
        run: apt-get update && apt-get install -y docker.io

      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Set up JDK 21
        uses: https://github.com/actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: https://github.com/actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: gradle-

      - name: Start test containers
        run: |
          docker run -d --name test-postgres \
            -e POSTGRES_DB=prizedraw_test \
            -e POSTGRES_USER=prizedraw \
            -e POSTGRES_PASSWORD=prizedraw \
            postgres:16-alpine

          docker run -d --name test-redis \
            redis:7-alpine

          for i in $(seq 1 15); do
            if docker exec test-postgres pg_isready -U prizedraw 2>/dev/null; then break; fi
            sleep 2
          done
          for i in $(seq 1 10); do
            if docker exec test-redis redis-cli ping 2>/dev/null | grep -q PONG; then break; fi
            sleep 1
          done

          PG_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' test-postgres)
          REDIS_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' test-redis)
          echo "PG_IP=${PG_IP}" >> $GITHUB_ENV
          echo "REDIS_IP=${REDIS_IP}" >> $GITHUB_ENV

      - name: Run tests (changed services only)
        run: |
          TASKS=""
          SERVICES="${{ needs.detect-changes.outputs.services-to-build }}"

          # Map service names to Gradle module names
          for SERVICE in $(echo "$SERVICES" | tr ',' ' '); do
            case "$SERVICE" in
              core-api) TASKS="$TASKS :server:test" ;;
              *) TASKS="$TASKS :${SERVICE}:test" ;;
            esac
          done

          # Always test api-contracts if shared modules changed
          if [ "${{ needs.detect-changes.outputs.shared-changed }}" = "true" ]; then
            TASKS="$TASKS :api-contracts:jvmTest"
          fi

          echo "Running: ./gradlew $TASKS"
          ./gradlew $TASKS --no-daemon
        env:
          DATABASE_URL: jdbc:postgresql://${{ env.PG_IP }}:5432/prizedraw_test
          DATABASE_USER: prizedraw
          DATABASE_PASSWORD: prizedraw
          REDIS_URL: redis://${{ env.REDIS_IP }}:6379
          JWT_SECRET: test-secret-for-ci-only

      - name: Cleanup
        if: always()
        run: docker rm -f test-postgres test-redis 2>/dev/null || true

  build-and-deploy:
    name: Build & Deploy
    runs-on: linux
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs.services-to-build != ''
    timeout-minutes: 30
    steps:
      - name: Install Docker
        run: apt-get update && apt-get install -y docker.io

      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Set up JDK 21
        uses: https://github.com/actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: https://github.com/actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: gradle-

      - name: Build shadow JARs (changed services only)
        run: |
          TASKS=""
          SERVICES="${{ needs.detect-changes.outputs.services-to-build }}"
          for SERVICE in $(echo "$SERVICES" | tr ',' ' '); do
            case "$SERVICE" in
              core-api) TASKS="$TASKS :server:shadowJar" ;;
              *) TASKS="$TASKS :${SERVICE}:shadowJar" ;;
            esac
          done
          echo "Building: $TASKS"
          ./gradlew $TASKS --no-daemon -x test

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u kennily --password-stdin

      - name: Build and push Docker images (changed services only)
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          SERVICES="${{ needs.detect-changes.outputs.services-to-build }}"

          for SERVICE in $(echo "$SERVICES" | tr ',' ' '); do
            DOCKERFILE="infra/docker/Dockerfile.${SERVICE}"
            IMAGE="${REGISTRY}/${IMAGE_PREFIX}_${SERVICE}"

            docker build -f "$DOCKERFILE" -t "${IMAGE}:staging" -t "${IMAGE}:sha-${SHORT_SHA}" .
            docker push "${IMAGE}:staging"
            docker push "${IMAGE}:sha-${SHORT_SHA}"

            echo "✅ Pushed ${IMAGE}:staging"
          done

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NAS_SSH_PRIVATE_KEY }}" > ~/.ssh/nas_key
          chmod 600 ~/.ssh/nas_key

      - name: Upload deployment files
        run: |
          NAS_HOST="${{ secrets.NAS_HOST }}"
          NAS_USER="${{ secrets.NAS_USER }}"

          ssh -i ~/.ssh/nas_key -o StrictHostKeyChecking=accept-new ${NAS_USER}@${NAS_HOST} \
            "mkdir -p /home/${NAS_USER}/prizedraw-staging"

          ssh -i ~/.ssh/nas_key -o StrictHostKeyChecking=accept-new ${NAS_USER}@${NAS_HOST} \
            "cat > /home/${NAS_USER}/prizedraw-staging/docker-compose.yml" < deployment/nas-staging/docker-compose.yml

      - name: Create .env and deploy
        run: |
          NAS_HOST="${{ secrets.NAS_HOST }}"
          NAS_USER="${{ secrets.NAS_USER }}"
          SERVICES="${{ needs.detect-changes.outputs.services-to-build }}"
          DEPLOY_DIR="/home/${NAS_USER}/prizedraw-staging"
          SSH_CMD="ssh -i ~/.ssh/nas_key -o StrictHostKeyChecking=accept-new ${NAS_USER}@${NAS_HOST}"

          # Write .env file
          ${SSH_CMD} "cat > ${DEPLOY_DIR}/.env" << 'ENVEOF'
          APP_ENV=staging
          LOG_LEVEL=INFO
          RATE_LIMIT_ENABLED=true
          POSTGRES_DB=prizedraw_staging
          POSTGRES_USER=prizedraw
          POSTGRES_PASSWORD=${{ secrets.PRIZEDRAW_DB_PASSWORD }}
          POSTGRES_PORT=5433
          REDIS_PASSWORD=${{ secrets.PRIZEDRAW_REDIS_PASSWORD }}
          MINIO_ROOT_USER=${{ secrets.PRIZEDRAW_MINIO_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.PRIZEDRAW_MINIO_PASSWORD }}
          STORAGE_BUCKET=prizedraw-staging
          JWT_SECRET=${{ secrets.PRIZEDRAW_JWT_SECRET }}
          JWT_ISSUER=prizedraw
          JWT_AUDIENCE=prizedraw-api
          REGISTRY=ghcr.io
          IMAGE_PREFIX=kennily/prizedraw
          IMAGE_TAG=staging
          ENVEOF

          # Login to GHCR on NAS
          ${SSH_CMD} "echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u kennily --password-stdin"

          # Pull changed service images
          for SERVICE in $(echo "${SERVICES}" | tr ',' ' '); do
            echo "📦 Pulling ${SERVICE}..."
            ${SSH_CMD} "cd ${DEPLOY_DIR} && docker compose pull ${SERVICE}"
          done

          # Deploy all services - docker-compose handles ordering via depends_on + healthcheck
          # (postgres/redis/minio start first, wait until healthy, then app services start)
          echo "🚀 Deploying..."
          ${SSH_CMD} "cd ${DEPLOY_DIR} && docker compose up -d"

      - name: Health check
        run: |
          NAS_HOST="${{ secrets.NAS_HOST }}"
          NAS_USER="${{ secrets.NAS_USER }}"
          DEPLOY_LIST="${{ needs.detect-changes.outputs.services-to-deploy }}"
          echo "Waiting for services to start..."
          sleep 15

          ssh -i ~/.ssh/nas_key -o StrictHostKeyChecking=accept-new ${NAS_USER}@${NAS_HOST} << ENDSSH
            for ENTRY in $(echo "${DEPLOY_LIST}" | tr ',' ' '); do
              NAME=\$(echo \$ENTRY | cut -d: -f1)
              PORT=\$(echo \$ENTRY | cut -d: -f2)
              echo "Checking \$NAME on port \$PORT..."
              for i in \$(seq 1 10); do
                if curl -sf http://localhost:\$PORT/health > /dev/null 2>&1; then
                  echo "✅ \$NAME is healthy"
                  break
                fi
                if [ \$i -eq 10 ]; then
                  echo "❌ \$NAME failed health check"
                  docker logs prizedraw-staging-\${NAME} --tail 30
                  exit 1
                fi
                sleep 5
              done
            done
            echo "🚀 Deployment complete"
          ENDSSH
