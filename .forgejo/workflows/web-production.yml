name: Web Production Deploy

on:
  push:
    tags:
      - 'web-v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. sha-abc1234)'
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: kennily/prizedraw

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: linux
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u kennily --password-stdin

      - name: Build and push Docker images
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION_TAG=""
          if [[ "${{ github.ref }}" == refs/tags/web-v* ]]; then
            VERSION_TAG=$(echo "${{ github.ref }}" | sed 's|refs/tags/web-||')
          fi

          APPS="web admin cs"
          for APP in $APPS; do
            DOCKERFILE="infra/docker/Dockerfile.${APP}"
            IMAGE="${REGISTRY}/${IMAGE_PREFIX}_${APP}"

            TAGS="-t ${IMAGE}:latest -t ${IMAGE}:sha-${SHORT_SHA}"
            if [ -n "$VERSION_TAG" ]; then
              TAGS="$TAGS -t ${IMAGE}:${VERSION_TAG}"
            fi

            docker build -f "$DOCKERFILE" \
              --build-arg NEXT_PUBLIC_API_URL=${{ secrets.PRIZEDRAW_PROD_API_URL }} \
              --build-arg NEXT_PUBLIC_WS_URL=${{ secrets.PRIZEDRAW_PROD_WS_URL }} \
              $TAGS \
              "${APP}/"

            docker push "${IMAGE}:latest"
            docker push "${IMAGE}:sha-${SHORT_SHA}"
            if [ -n "$VERSION_TAG" ]; then
              docker push "${IMAGE}:${VERSION_TAG}"
            fi

            echo "✅ Pushed ${IMAGE}"
          done

  deploy:
    name: Deploy to Production
    runs-on: linux
    needs: build-and-push
    timeout-minutes: 10
    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=latest" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_TAILSCALE_IP }}
          username: ken
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            cd ~/prizedraw

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u kennily --password-stdin

            export IMAGE_TAG="${{ steps.tag.outputs.TAG }}"

            docker compose pull web admin cs
            docker compose up -d --no-deps web admin cs

            echo "🎉 Frontend production deployment complete"
