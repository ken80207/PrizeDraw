name: Web Staging Deploy

on:
  push:
    branches: [staging]
    paths:
      - 'web/**'
      - 'admin/**'
      - 'cs/**'
      - 'pnpm-workspace.yaml'
      - '.forgejo/workflows/web-staging.yml'
      - 'infra/docker/Dockerfile.web'
      - 'infra/docker/Dockerfile.admin'
      - 'infra/docker/Dockerfile.cs'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: kennily/prizedraw

jobs:
  build-and-deploy:
    name: Build & Deploy to Staging
    runs-on: linux
    timeout-minutes: 20
    steps:
      - name: Install Docker
        run: apt-get update && apt-get install -y docker.io

      - name: Checkout
        uses: https://github.com/actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u kennily --password-stdin

      - name: Build and push Docker images
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)

          APPS="web admin cs"
          for APP in $APPS; do
            DOCKERFILE="infra/docker/Dockerfile.${APP}"
            IMAGE="${REGISTRY}/${IMAGE_PREFIX}_${APP}"

            docker build -f "$DOCKERFILE" \
              --build-arg NEXT_PUBLIC_API_URL=${{ secrets.PRIZEDRAW_STAGING_API_URL }} \
              --build-arg NEXT_PUBLIC_WS_URL=${{ secrets.PRIZEDRAW_STAGING_WS_URL }} \
              -t "${IMAGE}:staging" \
              -t "${IMAGE}:sha-${SHORT_SHA}" \
              .

            docker push "${IMAGE}:staging"
            docker push "${IMAGE}:sha-${SHORT_SHA}"

            echo "✅ Pushed ${IMAGE}:staging"
          done

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NAS_SSH_PRIVATE_KEY }}" > ~/.ssh/nas_key
          chmod 600 ~/.ssh/nas_key

      - name: Deploy to NAS
        run: |
          NAS_HOST="${{ secrets.NAS_HOST }}"
          NAS_USER="${{ secrets.NAS_USER }}"

          ssh -i ~/.ssh/nas_key -o StrictHostKeyChecking=accept-new ${NAS_USER}@${NAS_HOST} << 'ENDSSH'
            cd ~/prizedraw-staging
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u kennily --password-stdin
            docker compose pull web admin cs
            docker compose up -d --no-deps web admin cs
            echo "🚀 Frontend deployed to staging"
          ENDSSH
